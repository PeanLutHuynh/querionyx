services:
  - type: web
    name: querionyx-v3
    runtime: python
    rootDir: backend
    buildCommand: pip install -r ../requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENABLE_HEAVY_RAG
        value: "0"
      - key: QUERIONYX_LIGHTWEIGHT_RAG
        value: "1"
      - key: QUERIONYX_MERGE_LLM_ENABLED
        value: "0"
      - key: QUERIONYX_USE_LLM_ROUTER
        value: "0"
      - key: QUERIONYX_LIGHTWEIGHT_RAG_MS
        value: "4000"
      - key: QUERIONYX_SQL_EXECUTION_MS
        value: "5000"
      - key: QUERIONYX_END_TO_END_MS
        value: "10000"
